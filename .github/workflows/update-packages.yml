name: Update Package Managers

on:
  release:
    types: [published]

jobs:
  update-scoop:
    runs-on: ubuntu-latest
    steps:
      - name: Get release info
        id: release
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$GITHUB_REF_NAME" >> "$GITHUB_OUTPUT"

      - name: Download exe and compute hash
        id: hash
        run: |
          URL="https://github.com/HonotaKobo/tsumugi/releases/download/${{ steps.release.outputs.tag }}/tsumugi_${{ steps.release.outputs.version }}_x64-setup.exe"
          echo "Downloading $URL"
          curl -fSL -o setup.exe "$URL"
          HASH=$(sha256sum setup.exe | awk '{print $1}')
          echo "hash=$HASH" >> "$GITHUB_OUTPUT"
          echo "SHA256: $HASH"

      - name: Checkout scoop bucket
        uses: actions/checkout@v5
        with:
          repository: HonotaKobo/scoop-tsumugi
          token: ${{ secrets.PACKAGE_PAT }}

      - name: Update manifest
        uses: actions/github-script@v8
        env:
          VERSION: ${{ steps.release.outputs.version }}
          TAG: ${{ steps.release.outputs.tag }}
          HASH: ${{ steps.hash.outputs.hash }}
        with:
          script: |
            const fs = require('fs');
            const { VERSION, TAG, HASH } = process.env;
            const manifest = {
              version: VERSION,
              description: "Markdown viewer for the AI age",
              homepage: "https://github.com/HonotaKobo/tsumugi",
              license: "MIT",
              architecture: {
                "64bit": {
                  url: `https://github.com/HonotaKobo/tsumugi/releases/download/${TAG}/tsumugi_${VERSION}_x64-setup.exe#/setup.exe`,
                  hash: HASH
                }
              },
              installer: {
                script: [
                  "Start-Process \"$dir\\setup.exe\" -ArgumentList '/S' -Wait",
                  "Copy-Item \"$env:LOCALAPPDATA\\tsumugi\\tsumugi.exe\" \"$dir\\tsumugi.exe\""
                ]
              },
              uninstaller: {
                script: "Start-Process \"$dir\\setup.exe\" -ArgumentList '/UNINSTALL','/S' -Wait"
              },
              bin: "tsumugi.exe"
            };
            fs.writeFileSync('bucket/tsumugi.json', JSON.stringify(manifest, null, 4) + '\n');

      - name: Push scoop update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bucket/tsumugi.json
          git commit -m "Update tsumugi to ${{ steps.release.outputs.tag }}"
          git push

  update-homebrew:
    runs-on: ubuntu-latest
    steps:
      - name: Get release info
        id: release
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$GITHUB_REF_NAME" >> "$GITHUB_OUTPUT"

      - name: Download apps and compute hashes
        id: hash
        run: |
          BASE="https://github.com/HonotaKobo/tsumugi/releases/download/${{ steps.release.outputs.tag }}"
          VERSION="${{ steps.release.outputs.version }}"

          curl -fSL -o arm.app.tar.gz "$BASE/tsumugi_aarch64.app.tar.gz"
          ARM_HASH=$(sha256sum arm.app.tar.gz | awk '{print $1}')
          echo "arm=$ARM_HASH" >> "$GITHUB_OUTPUT"

          curl -fSL -o intel.app.tar.gz "$BASE/tsumugi_x64.app.tar.gz"
          INTEL_HASH=$(sha256sum intel.app.tar.gz | awk '{print $1}')
          echo "intel=$INTEL_HASH" >> "$GITHUB_OUTPUT"

          echo "ARM SHA256: $ARM_HASH"
          echo "Intel SHA256: $INTEL_HASH"

      - name: Checkout homebrew tap
        uses: actions/checkout@v5
        with:
          repository: HonotaKobo/homebrew-tsumugi
          token: ${{ secrets.PACKAGE_PAT }}

      - name: Update cask
        env:
          VERSION: ${{ steps.release.outputs.version }}
          ARM_HASH: ${{ steps.hash.outputs.arm }}
          INTEL_HASH: ${{ steps.hash.outputs.intel }}
        run: |
          cat > Casks/tsumugi.rb << 'TEMPLATE'
          cask "tsumugi" do
            arch arm: "aarch64", intel: "x64"

            version "VERSION_PLACEHOLDER"
            sha256 arm: "ARM_HASH_PLACEHOLDER",
                   intel: "INTEL_HASH_PLACEHOLDER"

            url "https://github.com/HonotaKobo/tsumugi/releases/download/v#{version}/tsumugi_#{arch}.app.tar.gz"
            name "tsumugi"
            desc "Markdown viewer for the AI age"
            homepage "https://github.com/HonotaKobo/tsumugi"

            app "tsumugi.app"
            binary "#{appdir}/tsumugi.app/Contents/MacOS/tsumugi"

            postflight do
              system_command "/usr/bin/xattr",
                             args: ["-cr", "#{appdir}/tsumugi.app"]
            end
          end
          TEMPLATE

          sed -i "s/VERSION_PLACEHOLDER/$VERSION/g" Casks/tsumugi.rb
          sed -i "s/ARM_HASH_PLACEHOLDER/$ARM_HASH/g" Casks/tsumugi.rb
          sed -i "s/INTEL_HASH_PLACEHOLDER/$INTEL_HASH/g" Casks/tsumugi.rb

      - name: Push homebrew update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/tsumugi.rb
          git commit -m "Update tsumugi to ${{ steps.release.outputs.tag }}"
          git push
