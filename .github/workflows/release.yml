name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release_id: ${{ steps.create.outputs.release_id }}
    steps:
      - name: Create draft release
        id: create
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          release_id=$(gh api repos/${{ github.repository }}/releases \
            -f tag_name=${{ github.ref_name }} \
            -f name="tsumugi ${{ github.ref_name }}" \
            -f body="See the assets to download and install this version." \
            -F draft=true \
            -F prerelease=false \
            -q '.id')
          echo "release_id=$release_id" >> "$GITHUB_OUTPUT"

  build:
    needs: create-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-14
            args: --target aarch64-apple-darwin
          - platform: macos-14
            args: --target x86_64-apple-darwin
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Mask developer name
        if: matrix.platform == 'macos-14'
        run: |
          echo "::add-mask::${{ secrets.APPLE_DEV_FIRST }}"
          echo "::add-mask::${{ secrets.APPLE_DEV_LAST }}"

      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: lts/*

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-14' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - run: npm ci

      - name: Write API key to file (macOS)
        if: matrix.platform == 'macos-14'
        run: |
          mkdir -p ~/private_keys
          cat <<'EOF' > ~/private_keys/AuthKey.p8
          ${{ secrets.APPLE_API_KEY_PATH }}
          EOF

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ matrix.platform == 'macos-14' && secrets.APPLE_CERTIFICATE || '' }}
          APPLE_CERTIFICATE_PASSWORD: ${{ matrix.platform == 'macos-14' && secrets.APPLE_CERTIFICATE_PASSWORD || '' }}
          APPLE_SIGNING_IDENTITY: ${{ matrix.platform == 'macos-14' && secrets.APPLE_SIGNING_IDENTITY || '' }}
          APPLE_API_ISSUER: ${{ matrix.platform == 'macos-14' && secrets.APPLE_API_ISSUER || '' }}
          APPLE_API_KEY: ${{ matrix.platform == 'macos-14' && secrets.APPLE_API_KEY || '' }}
          APPLE_API_KEY_PATH: ${{ matrix.platform == 'macos-14' && '~/private_keys/AuthKey.p8' || '' }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: ${{ matrix.args }}
