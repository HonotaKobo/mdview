<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>tsumugi</title>
    <link rel="stylesheet" href="./src/styles/main.css" />
    <link rel="stylesheet" href="./src/styles/markdown.css" />
    <link rel="stylesheet" href="./src/styles/editor.css" />
    <link rel="stylesheet" href="./src/styles/home.css" />
  </head>
  <body>
    <div id="find-bar" style="display: none">
      <div id="find-row">
        <input id="find-input" type="text" placeholder="" />
        <span id="find-count"></span>
        <button id="find-prev">&#9650;</button>
        <button id="find-next">&#9660;</button>
        <button id="find-close">&times;</button>
      </div>
      <div id="replace-row" style="display: none">
        <input id="replace-input" type="text" placeholder="" />
        <button id="replace-one"></button>
        <button id="replace-all"></button>
      </div>
    </div>
    <div id="main-area">
      <div id="scroll-area">
        <div id="content"></div>
      </div>
      <div id="tag-sidebar" style="display: none">
        <div id="tag-sidebar-header">
          <h2 id="tag-sidebar-title"></h2>
          <div id="tag-sidebar-file-label"></div>
          <button id="tag-sidebar-close">&times;</button>
        </div>
        <div id="tag-add-row">
          <input id="tag-input" type="text" placeholder="" />
          <button id="tag-add-btn"></button>
        </div>
        <div id="tag-sidebar-divider"></div>
        <div id="tag-list"></div>
        <div id="tag-count"></div>
      </div>
    </div>
    <div id="status-bar">
      <span id="status-mode-tabs">
        <button id="mode-view" class="mode-tab active">View</button>
        <button id="mode-edit" class="mode-tab">Edit</button>
        <button id="mode-split" class="mode-tab">Split</button>
      </span>
      <span class="status-sep">|</span>
      <span id="status-chars"></span>
      <span class="status-sep">|</span>
      <span id="status-words"></span>
      <span class="status-sep">|</span>
      <span id="status-read-time"></span>
      <span class="status-spacer"></span>
      <span id="status-tag-add" class="status-action"></span>
      <span class="status-sep">|</span>
      <span id="status-tag-edit" class="status-action"></span>
    </div>
    <script type="module" src="./src/main.ts"></script>
  </body>
</html>
