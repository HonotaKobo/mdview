<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>mdcast</title>
    <link rel="stylesheet" href="./src/styles/main.css" />
    <link rel="stylesheet" href="./src/styles/markdown.css" />
  </head>
  <body>
    <div id="titlebar">
      <div id="titlebar-left">
        <span id="doc-title">Untitled</span>
        <span id="dirty-indicator" style="display: none">●</span>
      </div>
    </div>
    <div id="find-bar" style="display: none">
      <input id="find-input" type="text" placeholder="Find..." />
      <span id="find-count"></span>
      <button id="find-prev" title="Previous">&#9650;</button>
      <button id="find-next" title="Next">&#9660;</button>
      <button id="find-close" title="Close">&times;</button>
    </div>
    <div id="scroll-area">
      <div id="content"></div>
    </div>
    <script type="module" src="./src/main.ts"></script>
  </body>
</html>
