<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>mdcast</title>
    <link rel="stylesheet" href="./src/styles/main.css" />
    <link rel="stylesheet" href="./src/styles/markdown.css" />
    <link rel="stylesheet" href="./src/styles/editor.css" />
  </head>
  <body>
    <div id="find-bar" style="display: none">
      <div id="find-row">
        <input id="find-input" type="text" placeholder="Find..." />
        <span id="find-count"></span>
        <button id="find-prev" title="Previous">&#9650;</button>
        <button id="find-next" title="Next">&#9660;</button>
        <button id="find-close" title="Close">&times;</button>
      </div>
      <div id="replace-row" style="display: none">
        <input id="replace-input" type="text" placeholder="Replace..." />
        <button id="replace-one" title="Replace">Replace</button>
        <button id="replace-all" title="Replace All">All</button>
      </div>
    </div>
    <div id="main-area">
      <div id="scroll-area">
        <div id="content"></div>
      </div>
      <div id="tag-sidebar" style="display: none">
        <div id="tag-sidebar-header">
          <h2>タグ</h2>
          <div id="tag-sidebar-file-label"></div>
          <button id="tag-sidebar-close">&times;</button>
        </div>
        <div id="tag-add-row">
          <input id="tag-input" type="text" placeholder="新しいタグ…" />
          <button id="tag-add-btn">追加</button>
        </div>
        <div id="tag-sidebar-divider"></div>
        <div id="tag-list"></div>
        <div id="tag-count"></div>
      </div>
    </div>
    <div id="status-bar">
      <span id="status-chars"></span>
      <span class="status-sep">|</span>
      <span id="status-words"></span>
      <span class="status-sep">|</span>
      <span id="status-read-time"></span>
      <span class="status-spacer"></span>
      <span id="status-tag-add" class="status-action" title="タグを追加">タグ追加</span>
      <span class="status-sep">|</span>
      <span id="status-tag-edit" class="status-action" title="タグを編集">タグ編集</span>
      <span class="status-sep">|</span>
      <span id="status-tag-manage" class="status-action" title="タグ管理">タグ管理</span>
    </div>
    <script type="module" src="./src/main.ts"></script>
  </body>
</html>
