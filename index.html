<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>tsumugi</title>
    <link rel="stylesheet" href="./src/styles/main.css" />
    <link rel="stylesheet" href="./src/styles/markdown.css" />
    <link rel="stylesheet" href="./src/styles/editor.css" />
    <link rel="stylesheet" href="./src/styles/home.css" />
    <link rel="stylesheet" href="./src/styles/tag.css" />
  </head>
  <body>
    <div id="find-bar" style="display: none">
      <div id="find-row">
        <input id="find-input" type="text" placeholder="" />
        <span id="find-count"></span>
        <button id="find-prev">&#9650;</button>
        <button id="find-next">&#9660;</button>
        <button id="find-close">&times;</button>
      </div>
      <div id="replace-row" style="display: none">
        <input id="replace-input" type="text" placeholder="" />
        <button id="replace-one"></button>
        <button id="replace-all"></button>
      </div>
    </div>
    <div id="main-area">
      <div id="scroll-area">
        <div id="content"></div>
      </div>
      <div id="tag-sidebar" class="w-[280px] shrink-0 flex flex-col border-l border-[var(--border-color)] bg-[var(--bg-secondary)] overflow-hidden" style="display: none">
        <div id="tag-sidebar-header" class="px-4 py-3 shrink-0 relative flex items-center justify-between border-b border-[var(--border-color)]">
          <h2 id="tag-sidebar-title" class="text-xs font-medium text-[var(--text-primary)] m-0"></h2>
          <div id="tag-sidebar-file-label" class="hidden"></div>
          <button id="tag-sidebar-close" class="bg-transparent border-none text-[var(--text-secondary)] cursor-pointer text-base px-1.5 py-0.5 leading-none rounded hover:text-[var(--text-primary)] hover:bg-[var(--bg-secondary)]">&times;</button>
        </div>
        <div id="tag-add-row" class="flex gap-1.5 px-4 py-3 border-b border-[var(--border-color)] shrink-0">
          <input id="tag-input" class="flex-1 px-2.5 py-1.5 text-xs font-[inherit] border border-[var(--border-color)] rounded bg-[var(--bg-primary)] text-[var(--text-primary)] outline-none min-w-0 transition-[border-color] duration-200 placeholder:text-[var(--text-secondary)] focus:border-[var(--link-color)]" type="text" placeholder="" />
          <button id="tag-add-btn" class="px-2.5 py-[3px] bg-[var(--text-primary)] text-[var(--bg-primary)] border border-[var(--text-primary)] rounded text-[11px] font-[inherit] font-medium cursor-pointer transition-opacity duration-150 whitespace-nowrap hover:opacity-80"></button>
        </div>
        <div id="tag-sidebar-divider" class="hidden"></div>
        <div id="tag-list" class="flex-1 overflow-y-auto py-2"></div>
        <div id="tag-count" class="text-[11px] text-[var(--text-secondary)] px-4 py-2 border-t border-[var(--border-color)] shrink-0"></div>
      </div>
    </div>
    <div id="status-bar">
      <span id="status-chars"></span>
      <span class="status-sep">|</span>
      <span id="status-words"></span>
      <span class="status-sep">|</span>
      <span id="status-read-time"></span>
      <span class="status-spacer"></span>
      <span id="status-tag-add" class="status-action"></span>
      <span class="status-sep">|</span>
      <span id="status-tag-edit" class="status-action"></span>
      <span class="status-sep">|</span>
      <span id="status-tag-manage" class="status-action"></span>
    </div>
    <script type="module" src="./src/main.ts"></script>
  </body>
</html>
